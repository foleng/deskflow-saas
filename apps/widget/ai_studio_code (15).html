<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskFlow Widget Demo</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* 自定义滚动条样式 */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* 进场动画 */
        .widget-enter {
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
        }
        .widget-active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }
        
        /* 语音波形动画 */
        @keyframes wave {
            0%, 100% { height: 4px; }
            50% { height: 16px; }
        }
        .wave-bar {
            animation: wave 1.2s infinite ease-in-out;
        }
        .wave-bar:nth-child(1) { animation-delay: 0.0s; }
        .wave-bar:nth-child(2) { animation-delay: 0.2s; }
        .wave-bar:nth-child(3) { animation-delay: 0.4s; }
        .wave-bar:nth-child(4) { animation-delay: 0.1s; }
        .wave-bar:nth-child(5) { animation-delay: 0.3s; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center font-sans">

    <div class="text-center text-gray-400">
        <h1 class="text-2xl font-bold mb-2">DeskFlow Widget Preview</h1>
        <p>点击右下角的蓝色按钮体验交互</p>
    </div>

    <!-- ========================================== -->
    <!-- Widget Container (这是你需要嵌入的代码) -->
    <!-- ========================================== -->
    <div id="deskflow-widget-container" class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-4">

        <!-- 1. Chat Window -->
        <div id="chat-window" class="widget-enter w-[380px] h-[600px] bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden transition-all duration-300 ease-out origin-bottom-right border border-gray-100">
            
            <!-- Header -->
            <div class="h-20 bg-gradient-to-r from-blue-600 to-blue-500 p-4 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <img src="https://i.pravatar.cc/150?u=agent" class="w-10 h-10 rounded-full border-2 border-white/30 shadow-sm">
                        <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-400 border-2 border-white rounded-full"></span>
                    </div>
                    <div class="text-white">
                        <h3 class="font-bold text-base leading-tight">Sarah Jenkins</h3>
                        <p class="text-blue-100 text-xs opacity-90">Support Agent • Online</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button class="text-white/80 hover:text-white p-1 rounded-full hover:bg-white/10 transition">
                        <i data-lucide="more-horizontal" class="w-5 h-5"></i>
                    </button>
                    <button onclick="toggleWidget()" class="text-white/80 hover:text-white p-1 rounded-full hover:bg-white/10 transition">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- Messages Area -->
            <div class="flex-1 bg-slate-50 overflow-y-auto p-4 space-y-4 scrollbar-hide" id="message-list">
                
                <!-- Time Divider -->
                <div class="flex justify-center">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider bg-gray-100 px-2 py-1 rounded-full">Today</span>
                </div>

                <!-- Agent Message: Text -->
                <div class="flex gap-3 max-w-[85%]">
                    <img src="https://i.pravatar.cc/150?u=agent" class="w-8 h-8 rounded-full self-end mb-1 shadow-sm">
                    <div class="bg-white p-3 rounded-2xl rounded-bl-none shadow-sm text-sm text-gray-700 leading-relaxed border border-gray-100">
                        Hi there! 👋 How can I help you with your order today?
                    </div>
                </div>

                <!-- User Message: Text -->
                <div class="flex gap-3 max-w-[85%] ml-auto flex-row-reverse">
                    <div class="bg-blue-600 p-3 rounded-2xl rounded-br-none shadow-md text-sm text-white leading-relaxed">
                        I received my package, but one item is broken.
                    </div>
                </div>

                <!-- Agent Message: Image -->
                <div class="flex gap-3 max-w-[85%]">
                    <img src="https://i.pravatar.cc/150?u=agent" class="w-8 h-8 rounded-full self-end mb-1 shadow-sm">
                    <div class="flex flex-col gap-1">
                        <div class="bg-white p-1 rounded-2xl rounded-bl-none shadow-sm border border-gray-100 overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" class="rounded-xl w-full h-32 object-cover">
                        </div>
                        <span class="text-[10px] text-gray-400 ml-1">Do you mean this product?</span>
                    </div>
                </div>

                <!-- User Message: File -->
                <div class="flex gap-3 max-w-[85%] ml-auto flex-row-reverse">
                    <div class="bg-blue-600 p-3 rounded-2xl rounded-br-none shadow-md text-white flex items-center gap-3 min-w-[200px] cursor-pointer hover:bg-blue-700 transition">
                        <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center shrink-0">
                            <i data-lucide="file-text" class="w-5 h-5 text-white"></i>
                        </div>
                        <div class="flex flex-col overflow-hidden">
                            <span class="text-sm font-bold truncate">receipt_broken.pdf</span>
                            <span class="text-xs text-blue-100">1.2 MB • PDF</span>
                        </div>
                    </div>
                </div>

                <!-- Agent Message: Voice (Audio) -->
                <div class="flex gap-3 max-w-[85%]">
                    <img src="https://i.pravatar.cc/150?u=agent" class="w-8 h-8 rounded-full self-end mb-1 shadow-sm">
                    <div class="bg-white p-3 rounded-2xl rounded-bl-none shadow-sm border border-gray-100 flex items-center gap-3 min-w-[180px]">
                        <button class="w-8 h-8 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center hover:bg-blue-100 transition">
                            <i data-lucide="play" class="w-4 h-4 fill-current"></i>
                        </button>
                        <div class="flex items-center gap-0.5 h-6">
                            <!-- Fake Waveform -->
                            <div class="w-1 bg-blue-400 rounded-full h-2"></div>
                            <div class="w-1 bg-blue-500 rounded-full h-4"></div>
                            <div class="w-1 bg-blue-600 rounded-full wave-bar h-3"></div>
                            <div class="w-1 bg-blue-500 rounded-full wave-bar h-5"></div>
                            <div class="w-1 bg-blue-400 rounded-full wave-bar h-2"></div>
                            <div class="w-1 bg-blue-300 rounded-full h-3"></div>
                            <div class="w-1 bg-blue-200 rounded-full h-1"></div>
                        </div>
                        <span class="text-xs text-gray-400 font-mono ml-auto">0:14</span>
                    </div>
                </div>

            </div>

            <!-- Input Area -->
            <div class="p-4 bg-white border-t border-gray-100 shrink-0">
                <div class="relative">
                    <input type="text" placeholder="Type a message..." class="w-full bg-gray-50 border border-gray-200 rounded-full pl-4 pr-24 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-100 focus:border-blue-300 transition-all">
                    
                    <div class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center gap-1">
                        <!-- Attachment -->
                        <button class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-200 rounded-full transition" title="Attach file">
                            <i data-lucide="paperclip" class="w-4 h-4"></i>
                        </button>
                        <!-- Voice -->
                        <button class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-200 rounded-full transition" title="Record voice">
                            <i data-lucide="mic" class="w-4 h-4"></i>
                        </button>
                        <!-- Send -->
                        <button class="w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center hover:bg-blue-700 transition shadow-sm shadow-blue-200">
                            <i data-lucide="send" class="w-4 h-4 ml-0.5"></i>
                        </button>
                    </div>
                </div>
                <div class="text-center mt-2">
                     <span class="text-[10px] text-gray-300 flex items-center justify-center gap-1">
                        Powered by <span class="font-bold text-gray-400">DeskFlow</span>
                     </span>
                </div>
            </div>
        </div>

        <!-- 2. Launcher Button -->
        <button id="launcher-btn" onclick="toggleWidget()" class="w-14 h-14 bg-blue-600 rounded-full shadow-lg shadow-blue-600/30 text-white flex items-center justify-center hover:scale-105 hover:bg-blue-700 transition-all duration-300 group z-50">
            <!-- Chat Icon (Default) -->
            <i data-lucide="message-circle" class="w-7 h-7 absolute transition-all duration-300 group-hover:scale-0 opacity-100 group-hover:opacity-0 scale-100" id="icon-open"></i>
            
            <!-- Close Icon (Hidden) -->
            <i data-lucide="chevron-down" class="w-7 h-7 absolute transition-all duration-300 group-hover:scale-100 opacity-0 group-hover:opacity-100 scale-0 rotate-180" id="icon-close"></i>
        </button>

    </div>

    <script>
        // 初始化图标
        lucide.createIcons();

        let isOpen = false;
        const chatWindow = document.getElementById('chat-window');
        const iconOpen = document.getElementById('icon-open');
        const iconClose = document.getElementById('icon-close');

        function toggleWidget() {
            isOpen = !isOpen;
            if (isOpen) {
                // 打开状态
                chatWindow.classList.remove('widget-enter');
                chatWindow.classList.add('widget-active');
                
                // 图标动画
                iconOpen.style.opacity = '0';
                iconOpen.style.transform = 'scale(0) rotate(90deg)';
                iconClose.style.opacity = '1';
                iconClose.style.transform = 'scale(1) rotate(0deg)';
            } else {
                // 关闭状态
                chatWindow.classList.remove('widget-active');
                chatWindow.classList.add('widget-enter');

                // 图标动画
                iconOpen.style.opacity = '1';
                iconOpen.style.transform = 'scale(1) rotate(0deg)';
                iconClose.style.opacity = '0';
                iconClose.style.transform = 'scale(0) rotate(-90deg)';
            }
        }
    </script>
</body>
</html>
